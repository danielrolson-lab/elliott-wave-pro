# fly.toml — Elliott Wave Pro wave-scanner service
app = "elliott-wave-scanner"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https   = true
  auto_stop_machines  = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "requests"
    hard_limit = 100
    soft_limit = 50

[[vm]]
  cpu_kind = "shared"
  cpus     = 1
  memory_mb = 512
